# golangci-lint config for k8s LogJedi operator (v2)
# https://golangci-lint.run/usage/configuration/
version: "2"
run:
  timeout: 2m
  modules-download-mode: readonly
linters:
  enable:
    - govet
    - errcheck
    - staticcheck
  disable:
    - deadcode
    - varcheck
  settings:
    govet:
      enable: [shadow]
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
