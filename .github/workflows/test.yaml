name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.21"

jobs:
  test-operator:
    name: Test operator (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: operator/go.sum

      - name: Run tests
        run: |
          cd operator
          go vet ./...
          go test ./...

  test-llm-service:
    name: Test LLM service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (uv)
        uses: astral-sh/setup-uv@v4

      - name: Install and test
        run: |
          cd llm-service
          uv sync --extra dev
          uv run pytest -q --tb=short
