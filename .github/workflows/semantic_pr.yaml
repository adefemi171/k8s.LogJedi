name: Semantic PR validation

on:
  pull_request_target:
    types: [opened, edited, synchronize]

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Validate pull request title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            build
            chore
            ci
            docs
            perf
            refactor
            revert
            style
            test
            deps
          requireScope: false
          validateSingleCommit: true
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" in the pull request title "{title}"
            didn't match the configured pattern. Please ensure the subject
            doesn't start with an uppercase character.
