# Build Docker images and push to GitHub Container Registry (ghcr.io).
# Image tag = date-time (YYYYMMDD-HHMMSS UTC). Push only on main from non-fork.
name: Build and push images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
defaults:
  run:
    shell: bash

jobs:
  prepare_ci_run:
    name: Prepare CI run
    runs-on: ubuntu-latest
    outputs:
      DATETIME: ${{ steps.get_datetime.outputs.DATETIME }}
      NON_FORKED_AND_NON_ROBOT_RUN: ${{ steps.get_run_type.outputs.NON_FORKED_AND_NON_ROBOT_RUN }}
    steps:
      - name: Get current date and time
        id: get_datetime
        run: |
          DATETIME=$(date -u +%Y%m%d-%H%M%S)
          echo "DATETIME=$DATETIME" >> "$GITHUB_OUTPUT"
          echo "Image tag: $DATETIME"

      - name: Get workflow run type
        id: get_run_type
        run: |
          NON_FORKED_AND_NON_ROBOT_RUN=${{ (github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]') && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
          echo "NON_FORKED_AND_NON_ROBOT_RUN=$NON_FORKED_AND_NON_ROBOT_RUN" >> "$GITHUB_OUTPUT"

  build_and_push:
    name: Build and push to GHCR
    needs: prepare_ci_run
    if: github.event_name == 'push' && needs.prepare_ci_run.outputs.NON_FORKED_AND_NON_ROBOT_RUN == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DATETIME: ${{ needs.prepare_ci_run.outputs.DATETIME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push operator
        uses: docker/build-push-action@v6
        with:
          context: ./operator
          file: ./operator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/logjedi-operator:${{ env.DATETIME }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/logjedi-operator:latest
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha,scope=logjedi-operator
          cache-to: type=gha,mode=max,scope=logjedi-operator

      - name: Build and push LLM service
        uses: docker/build-push-action@v6
        with:
          context: ./llm-service
          file: ./llm-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/logjedi-llm-service:${{ env.DATETIME }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/logjedi-llm-service:latest
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha,scope=logjedi-llm-service
          cache-to: type=gha,mode=max,scope=logjedi-llm-service
