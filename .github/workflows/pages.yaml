# Deploy docs to GitHub Pages (optional: enable in repo Settings > Pages).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build docs (optional)
        run: |
          mkdir -p _site
          if [ -d docs ]; then
            cp -r docs _site/
          fi
          if [ -f README.md ]; then
            cp README.md _site/
          fi
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>k8s LogJedi</title><meta http-equiv="refresh" content="0;url=README.md"></head><body>Redirect to <a href="README.md">README</a></body></html>' > _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
