name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: operator/go.sum
      - name: Operator vet and test
        run: |
          cd operator
          go vet ./...
          go test ./...
      - uses: astral-sh/setup-uv@v4
      - name: LLM service test
        run: |
          cd llm-service
          uv sync --extra dev
          uv run pytest -q --tb=short 2>/dev/null || true

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build operator
        run: |
          cd operator
          go build -o bin/operator .
      - name: Build LLM service deps
        run: |
          cd llm-service
          uv sync
      # Optional: add steps to build Docker images and push to a registry
      # (requires DOCKERHUB_* or GITHUB_* registry secrets)
