# RBAC for operator - pods, deployments, jobs, events (step 6)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logsage-operator
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logsage-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logsage-operator
subjects:
  - kind: ServiceAccount
    name: logsage-operator
    namespace: logsage
