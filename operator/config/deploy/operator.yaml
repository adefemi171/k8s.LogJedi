# k8s LogJedi operator: Deployment, ServiceAccount (RBAC in rbac.yaml, config in configmap.yaml)
apiVersion: v1
kind: Namespace
metadata:
  name: logjedi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logjedi-operator
  namespace: logjedi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logjedi-operator
  namespace: logjedi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logjedi-operator
  template:
    metadata:
      labels:
        app: logjedi-operator
    spec:
      serviceAccountName: logjedi-operator
      containers:
        - name: operator
          image: logjedi-operator:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: logjedi-operator-config
          env:
            - name: LLM_SERVICE_URL
              value: "http://llm-service.logjedi.svc.cluster.local:8000"
