# {{- if and .Values.llmService.enabled .Values.llmService.createSecret .Values.llmService.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: logjedi-llm-openai
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: llm-service
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.llmService.apiKey | quote }}
# {{- end }}
